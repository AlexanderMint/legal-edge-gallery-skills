<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Russian Law Search</title>
</head>
<body>
<script>
(() => {
  "use strict";

  const ALLOWED_DOMAINS = [
    "pravo.gov.ru",
    "publication.pravo.gov.ru",
    "vsrf.ru",
    "ksrf.ru",
    "sudrf.ru",
    "government.ru"
  ];

  function isAllowedUrl(value) {
    try {
      const url = new URL(value);
      if (url.protocol !== "https:" && url.protocol !== "http:") return false;
      return ALLOWED_DOMAINS.some(
        (domain) => url.hostname === domain || url.hostname.endsWith(`.${domain}`)
      );
    } catch (_) {
      return false;
    }
  }

  function cleanText(value, maxLength) {
    const text = String(value ?? "")
      .replace(/\s+/g, " ")
      .trim();
    return text.length <= maxLength ? text : `${text.slice(0, maxLength)}…`;
  }

  function parseInput(data) {
    const input = JSON.parse(data);
    if (input === null || typeof input !== "object" || Array.isArray(input)) {
      throw new Error("data должен быть JSON-объектом");
    }

    const query = cleanText(input.query, 400);
    if (!query) throw new Error("query не может быть пустым");

    const maxResults = Number.isInteger(input.max_results)
      ? input.max_results
      : 3;
    if (maxResults < 1 || maxResults > 5) {
      throw new Error("max_results должен быть от 1 до 5");
    }

    const searchDepth = input.search_depth ?? "advanced";
    if (searchDepth !== "basic" && searchDepth !== "advanced") {
      throw new Error("search_depth должен быть basic или advanced");
    }

    return { query, maxResults, searchDepth };
  }

  window["ai_edge_gallery_get_result"] = async (data, secret) => {
    try {
      if (!secret || !String(secret).trim()) {
        throw new Error("Не указан API-ключ Tavily");
      }

      const { query, maxResults, searchDepth } = parseInput(data);

      const response = await fetch("https://api.tavily.com/search", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${String(secret).trim()}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          query,
          topic: "general",
          search_depth: searchDepth,
          max_results: maxResults,
          chunks_per_source: 3,
          include_answer: false,
          include_raw_content: false,
          include_images: false,
          include_domains: ALLOWED_DOMAINS,
          include_usage: true
        })
      });

      if (!response.ok) {
        const body = cleanText(await response.text(), 500);
        throw new Error(`Tavily вернул HTTP ${response.status}: ${body}`);
      }

      const payload = await response.json();
      const results = Array.isArray(payload.results)
        ? payload.results
            .filter((item) => isAllowedUrl(item.url))
            .slice(0, maxResults)
            .map((item) => ({
              title: cleanText(item.title, 300),
              url: String(item.url),
              excerpt: cleanText(item.content, 3500),
              score: typeof item.score === "number" ? item.score : null,
              published_date: item.published_date ?? null
            }))
        : [];

      return JSON.stringify({
        result: {
          query,
          provider: "Tavily Search API",
          official_domains_only: true,
          domains: ALLOWED_DOMAINS,
          results,
          warning: results.length === 0
            ? "Официальные результаты не найдены. Не делайте правовой вывод без дополнительной проверки."
            : "Поисковые фрагменты не всегда являются полным текстом нормы. Проверяйте официальный документ по URL.",
          usage: payload.usage ?? null
        }
      });
    } catch (error) {
      console.error(error);
      return JSON.stringify({
        error: `Ошибка поиска законодательства: ${
          error instanceof Error ? error.message : String(error)
        }`
      });
    }
  };
})();
</script>
</body>
</html>
